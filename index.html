
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision Editor | Creative Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #000000;
        color: #f8fafc;
        overflow: hidden;
      }
      .font-display {
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.2em;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Ultra-thin scrollbar for stealth look */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #000000;
      }
      ::-webkit-scrollbar-thumb {
        background: #1a1a1a;
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2a2a2a;
      }
      
      /* Simple Stealth Glow */
      .stealth-border {
        border: 1px solid #1a1a1a;
      }
      .active-glow {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
      }
      input[type="range"] {
        -webkit-appearance: none;
        background: #1a1a1a;
        height: 2px;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 12px;
        width: 12px;
        border-radius: 50%;
        background: #ffffff;
        cursor: pointer;
        border: 2px solid #000000;
      }

      @keyframes slide {
        from { transform: translateY(0); }
        to { transform: translateY(-20px); }
      }

      @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 1px); }
        40% { transform: translate(-2px, -1px); }
        60% { transform: translate(2px, 1px); }
        80% { transform: translate(2px, -1px); }
        100% { transform: translate(0); }
      }

      @keyframes scale-in {
        0% { transform: scale(0.8) translateY(20px); opacity: 0; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }

      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
      }
    </style>
  <script type="importmap">

</script>

</html>
